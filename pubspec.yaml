name: buwang_schedule
description: '不忘课表 - 个人课程管理工具'
publish_to: 'none'
version: 1.4.5+9

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  file_picker: ^8.0.3
  html: ^0.15.4
  share_plus: ^9.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.1.0
  # Phase 1: 系统日历静默写入
  device_calendar: ^4.3.2
  # Phase 1: 运行时权限请求
  permission_handler: ^11.0.0
  # timezone 支持（device_calendar 需要）
  timezone: ^0.9.2
  # Phase 3: 应用内通知
  flutter_local_notifications: ^18.0.1
  # Phase 3: 日志
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
