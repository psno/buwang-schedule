name: Build Android & iOS

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  # ═══════════════════════════════════════
  #  Android APK 构建（ubuntu runner，免费）
  # ═══════════════════════════════════════
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ═══════════════════════════════════════
  #  iOS IPA 构建（macOS runner，免费额度 2000 分钟/月）
  # ═══════════════════════════════════════
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - run: flutter pub get

      # 构建 iOS（无签名，用于验证编译是否通过）
      # 如果需要签名 IPA，需要配置 provisioning profile 和证书
      - run: flutter build ios --release --no-codesign

      # 打包 Runner.app 为 zip（无签名版本）
      - name: Package iOS build
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../buwang_schedule_ios.zip Payload
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            build/ios/iphoneos/Runner.app
            buwang_schedule_ios.zip

  # ═══════════════════════════════════════
  #  iOS 编译检查（快速，只检查能否编译通过）
  # ═══════════════════════════════════════
  ios-compile-check:
    name: iOS Compile Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter build ios --release --no-codesign
